<!DOCTYPE html>
<html>
<head>
<title>Amko</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
padding:20px;
margin:0;
}
.box{
background:#1e293b;
padding:25px;
border-radius:20px;
max-width:420px;
margin:40px auto;
text-align:center;
}
input,select,button{
width:100%;
padding:14px;
margin-top:12px;
border-radius:12px;
border:none;
font-size:16px;
}
#process{
display:none;
margin-top:20px;
text-align:left;
}
.step{
padding:10px;
margin-top:8px;
background:#334155;
border-radius:10px;
}
</style>
</head>

<body>

<div class="box">

<div id="home">
<h1>🚀 AMKO</h1>
<p>One-Click Burmese AI Video Translator</p>

<input type="text" placeholder="Paste YouTube link...">

<select>
<option>Auto Detect → Myanmar</option>
<option>Chinese → Myanmar</option>
<option>English → Myanmar</option>
</select>

<select>
<option>Narrator Voice</option>
<option>Male Voice</option>
<option>Female Voice</option>
</select>

<button onclick="start()">🎬 Translate Now</button>
</div>

<div id="process">
<h2>AI Processing...</h2>

<div class="step">✅ Video analyzed</div>
<div class="step">🔄 Translating to Myanmar...</div>
<div class="step">⏳ Generating Myanmar voice...</div>
<div class="step">⏳ Creating subtitles...</div>
<div class="step">⏳ Exporting video...</div>

</div>

</div>

<script>
function start(){
document.getElementById("home").style.display="none";
document.getElementById("process").style.display="block";

setTimeout(function(){
document.getElementById("process").innerHTML=`
<h2>✅ Translation Complete</h2>

<div class='step'>🎬 Video Preview Ready</div>
<div class='step'>📝 Burmese Subtitle Ready</div>
<div class='step'>🗣️ Myanmar Voice Added</div>

<button>⬇️ Download Video</button>
`;
},5000)

}
</script>

</body>
</html>
