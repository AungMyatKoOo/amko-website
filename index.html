<!DOCTYPE html>
<html>
<head>
<title>AMKO AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}
.box{
background:#1e293b;
padding:20px;
border-radius:20px;
max-width:450px;
margin:auto;
text-align:center;
margin-top:20px;
}
input,select,button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
font-size:16px;
}
button{
cursor:pointer;
}
.step{
background:#334155;
padding:12px;
margin-top:10px;
border-radius:10px;
text-align:left;
}
.small{
font-size:13px;
opacity:.8;
}
.bar{
background:#334155;
height:20px;
border-radius:20px;
overflow:hidden;
margin-top:15px;
}
#fill{
height:20px;
width:0%;
background:#22c55e;
}
video,iframe{
width:100%;
border-radius:12px;
margin-top:12px;
border:none;
}
</style>
</head>
<body>

<div class="box" id="loginPage">
<h1>🚀 AMKO AI</h1>
<p>Login with Gmail</p>

<input id="gmail" placeholder="Enter Gmail">

<button onclick="loginUser()">
🔐 Continue
</button>
</div>

<div class="box" id="homePage" style="display:none">

<h2>👑 Owner Mode Active</h2>

<div class="step" id="profileBox">
Profile: -
</div>

<input id="ytlink"
placeholder="Paste YouTube Link">

<input type="file"
id="videoFile"
accept="video/*">

<div class="small"
id="fileStatus">
Video မရွေးရသေးပါ
</div>

<select>
<option>Auto → Myanmar</option>
<option>English → Myanmar</option>
<option>Chinese → Myanmar</option>
</select>

<select>
<option>Myanmar Male Voice</option>
<option>Myanmar Female Voice</option>
</select>

<button onclick="start()">
🎬 Translate
</button>

<div id="process"></div>

</div>

<script>

let currentFile=null;

function loginUser(){

let gmail=
document.getElementById(
"gmail"
).value.trim();

if(gmail==""){
alert("Gmail ထည့်ပါ");
return;
}

document.getElementById(
"profileBox"
).innerHTML=
"Profile: "+gmail;

document.getElementById(
"loginPage"
).style.display="none";

document.getElementById(
"homePage"
).style.display="block";

}

document
.getElementById("videoFile")
.addEventListener(
"change",
function(){

currentFile=this.files[0];

if(currentFile){

document
.getElementById(
"fileStatus"
)
.innerText=
"📁 "+currentFile.name;

}

});

function start(){

let link=
document.getElementById(
"ytlink"
).value.trim();

if(!currentFile && link==""){

alert(
"YouTube link သို့ Video ထည့်ပါ"
);

return;

}

document.getElementById(
"process"
).innerHTML=`

<h2>🤖 AI Processing...</h2>

<div class='bar'>
<div id='fill'></div>
</div>

<p id='percent'>0%</p>

<div class='step' id='status'>
⏳ Starting...
</div>

`;

let p=0;

let t=setInterval(()=>{

p+=10;

document.getElementById(
"fill"
).style.width=
p+"%";

document.getElementById(
"percent"
).innerText=
p+"%";

if(p==20)
document.getElementById("status").innerText=
"✅ Video analyzed";

if(p==40)
document.getElementById("status").innerText=
"🌐 Translating";

if(p==60)
document.getElementById("status").innerText=
"🗣️ Voice creating";

if(p==80)
document.getElementById("status").innerText=
"📝 Subtitle creating";

if(p>=100){

clearInterval(t);

let media="";

if(currentFile){

let url=
URL.createObjectURL(currentFile);

media=`
<video controls src="${url}"></video>

<a href="${url}" download="${currentFile.name}">
<button>⬇️ Download</button>
</a>
`;

}else{

let id="";

if(link.includes("v=")){
id=link.split("v=")[1].split("&")[0];
}

media=`
<iframe
height="220"
src="https://www.youtube.com/embed/${id}">
</iframe>
`;

}

document.getElementById(
"process"
).innerHTML=`

<h2>✅ Translation Complete</h2>

${media}

<div class='step'>
📝 Subtitle:

<br><br>

[00:01] မင်္ဂလာပါ

<br>

[00:04] AMKO AI ဘာသာပြန်ပြီးပါပြီ
</div>

<div class='step'>
🗣️ Myanmar Voice Added
</div>

`;

}

},500);

}

</script>

</body>
</html>
