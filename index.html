<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AMKO AI</title>

<style>
body{
background:#0f172a;
color:#fff;
font-family:Arial;
padding:20px;
margin:0
}
.box{
max-width:450px;
margin:auto;
background:#1e293b;
padding:20px;
border-radius:20px
}
input,select,button{
width:100%;
padding:14px;
margin-top:12px;
border-radius:12px;
border:none;
font-size:16px
}
button{
background:#475569;
color:white
}
.step{
background:#334155;
padding:12px;
border-radius:10px;
margin-top:10px
}
video,iframe{
width:100%;
border-radius:10px;
margin-top:10px
}
.bar{
height:20px;
background:#334155;
border-radius:20px;
overflow:hidden
}
#fill{
height:100%;
width:0%;
background:#22c55e
}
</style>
</head>
<body>

<div class="box">

<h1>🚀 AMKO AI</h1>

<input id="yt"
placeholder="Paste YouTube Link">

<input
type="file"
id="video"
accept="video/*">

<select>
<option>Auto → Myanmar</option>
<option>English → Myanmar</option>
<option>Chinese → Myanmar</option>
</select>

<select>
<option>Myanmar Male Voice</option>
<option>Myanmar Female Voice</option>
</select>

<button onclick="run()">
🎬 Translate
</button>

<div id="out"></div>

</div>

<script>

let file=null;

video.onchange=e=>{
file=e.target.files[0]
}

function getYoutubeId(url){

const reg=
/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&]+)/;

let m=url.match(reg);

return m?m[1]:"";

}

function run(){

let link=
document.getElementById("yt").value;

if(!file&&!link){

alert(
"Video or YouTube Link ထည့်ပါ"
);

return;

}

out.innerHTML=`

<h2>🤖 Processing</h2>

<div class=bar>
<div id=fill></div>
</div>

<p id=p>0%</p>

`;

let x=0;

let t=setInterval(()=>{

x+=10;

fill.style.width=x+"%";

p.innerText=x+"%";

if(x>=100){

clearInterval(t);

let media="";

if(file){

let url=
URL.createObjectURL(file);

media=`

<video controls
src="${url}">
</video>

<a href="${url}"
download="${file.name}">
<button>
⬇ Download
</button>
</a>

`;

}else{

let id=
getYoutubeId(link);

if(id){

media=`

<iframe
height=250
src="https://www.youtube-nocookie.com/embed/${id}"
allowfullscreen>
</iframe>

<a href="${link}"
target=_blank>

<button>
▶ Open YouTube
</button>

</a>

`;

}else{

media=`
<div class=step>
❌ Invalid YouTube Link
</div>
`;

}

}

out.innerHTML=`

<h2>
✅ Translation Complete
</h2>

${media}

<div class=step>

📝 Subtitle

<br><br>

[00:01] မင်္ဂလာပါ

<br>

[00:04]
AMKO AI ဘာသာပြန်ပြီးပါပြီ

</div>

<div class=step>

🗣 Myanmar Voice Added

</div>

`;

}

},400)

}

</script>

</body>
</html>
