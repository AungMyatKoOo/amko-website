<!DOCTYPE html>
<html>
<head>
<title>AMKO AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
padding:20px;
margin:0;
}
.box{
background:#1e293b;
padding:20px;
border-radius:20px;
max-width:430px;
margin:auto;
text-align:center;
}
input,button,select{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
}
.step{
background:#334155;
padding:10px;
margin-top:10px;
border-radius:10px;
}
video{
width:100%;
margin-top:15px;
border-radius:12px;
}
</style>
</head>
<body>

<div class="box">

<h1>🚀 AMKO AI</h1>

<input
id="ytlink"
placeholder="Paste YouTube link">

<input
type="file"
id="videoFile"
accept="video/*">

<select id="voice">
<option>Myanmar Male Voice</option>
<option>Myanmar Female Voice</option>
</select>

<div id="status">
Video မရွေးရသေးပါ
</div>

<button onclick="start()">
🎬 Translate
</button>

<div id="result"></div>

</div>

<script>

let currentFile;

document
.getElementById("videoFile")
.addEventListener(
"change",
function(){

currentFile=this.files[0];

if(currentFile){

document
.getElementById("status")
.innerHTML=
"📁 "+currentFile.name;

}

});

function start(){

let link=
document.getElementById(
"ytlink"
).value;

if(
!currentFile &&
link==""
){

alert(
"YouTube link သို့ Video ထည့်ပါ"
);

return;

}

document
.getElementById(
"result"
).innerHTML=`

<div class='step'>
🤖 AI analyzing voice...
</div>

<div class='step'>
🌐 Translating to Myanmar...
</div>

<div class='step'>
🗣️ Creating Myanmar Voice...
</div>

`;

setTimeout(()=>{

let video="";

if(currentFile){

let url=
URL.createObjectURL(
currentFile
);

video=`

<video
controls
src="${url}">
</video>

`;

}else{

video=`

<div class='step'>
📺 YouTube Link:
<br><br>
${link}
</div>

`;

}

document
.getElementById(
"result"
).innerHTML=`

<h2>
✅ Translation Complete
</h2>

${video}

<div class='step'>

📝 Subtitle:

<br><br>

[00:01]
မင်္ဂလာပါ

<br>

[00:04]
AMKO AI
ဘာသာပြန်ပြီးပါပြီ

</div>

<div class='step'>
🗣️ Myanmar Voice Added
</div>

<button>
⬇️ Download
</button>

`;

},3000)

}

</script>

</body>
</html>
