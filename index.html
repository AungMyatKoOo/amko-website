<!DOCTYPE html>
<html>
<head>
<title>Amko</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}
.box{
background:#1e293b;
padding:25px;
border-radius:20px;
max-width:430px;
margin:20px auto;
text-align:center;
}
input,select,button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
font-size:16px;
}
.step{
background:#334155;
padding:12px;
margin-top:10px;
border-radius:10px;
text-align:left;
}
.small{
opacity:.8;
font-size:13px;
}
video{
width:100%;
border-radius:12px;
margin-top:10px;
}
</style>
</head>
<body>

<div class="box">
<h1>🚀 AMKO</h1>

<input type="file" id="videoFile" accept="video/*">
<div class="small" id="fileStatus">
Video မရွေးရသေးပါ
</div>

<button onclick="start()">
🎬 Translate
</button>

<div id="process"></div>
</div>

<script>

document.getElementById("videoFile")
.addEventListener("change",function(){

let f=this.files[0];

if(f){
document.getElementById(
"fileStatus"
).innerText="📁 "+f.name;
}

});

function start(){

let file=
document.getElementById(
"videoFile"
).files[0];

if(!file){
alert("Video ရွေးပါ");
return;
}

document.getElementById(
"process"
).innerHTML=`

<h2>🤖 Processing...</h2>
<div class='step'>⏳ Working...</div>

`;

setTimeout(function(){

let url=
URL.createObjectURL(file);

document.getElementById(
"process"
).innerHTML=`

<h2>✅ Complete</h2>

<video
controls
src="${url}">
</video>

<div class='step'>
📝 Subtitle Ready
</div>

<a href="${url}"
download="${file.name}">
<button>
⬇️ Download Video
</button>
</a>

`;

},3000)

}

</script>

</body>
</html>
