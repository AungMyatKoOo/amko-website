<!DOCTYPE html>
<html>
<head>
<title>Amko</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>

body{
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}

.box{
background:#1e293b;
padding:25px;
border-radius:20px;
max-width:420px;
margin:20px auto;
text-align:center;
}

input,select,button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
font-size:16px;
}

.step{
background:#334155;
padding:12px;
margin-top:10px;
border-radius:10px;
}

.small{
opacity:.8;
font-size:13px;
}

</style>
</head>

<body>

<div class="box" id="login">

<h1>🚀 AMKO</h1>

<p>Login First</p>

<input
id="gmail"
placeholder="Enter Gmail">

<button onclick="login()">

🔐 Continue

</button>

</div>


<div class="box"
id="home"
style="display:none">

<h2>
👑 Owner Mode Active
</h2>

<div class="step">

Profile:
owner@gmail.com

<br><br>

Unlimited Access

</div>

<input
type="file"
id="videoFile"
accept="video/*">

<div
class="small"
id="fileStatus">

Video မရွေးရသေးပါ

</div>

<input
id="ytlink"
placeholder=
"Paste YouTube link">

<select>
<option>
Auto → Myanmar
</option>
</select>

<select>
<option>
Narrator
</option>

<option>
Male
</option>

<option>
Female
</option>
</select>

<button
onclick="start()">

🎬 Translate

</button>

<div id="process">
</div>

</div>

<script>

function login(){

let g=
document.getElementById(
"gmail"
).value;

if(g==""){

alert(
"Gmail ထည့်ပါ"
);

return;

}

document.getElementById(
"login"
).style.display=
"none";

document.getElementById(
"home"
).style.display=
"block";

}

document.addEventListener(
"change",
function(e){

if(
e.target.id==
"videoFile"
){

let f=
e.target.files[0];

if(f){

document.getElementById(
"fileStatus"
).innerText=
"📁 "+f.name;

}

}

}
);

function start(){

document.getElementById(
"process"
).innerHTML=`

<h2>
🤖 Processing...
</h2>

<div class='step'>
⏳ Analyzing
</div>

`;

setTimeout(function(){

document.getElementById(
"process"
).innerHTML=`

<h2>
✅ Complete
</h2>

<div class='step'>
🎬 Video Ready
</div>

<div class='step'>
📝 Subtitle Ready
</div>

<button>

⬇️ Download

</button>

`;

},5000)

}

</script>

</body>
</html>
