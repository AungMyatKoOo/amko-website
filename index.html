<!DOCTYPE html>
<html>
<head>
<title>AMKO AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
padding:20px;
}
.box{
background:#1e293b;
padding:20px;
border-radius:20px;
max-width:430px;
margin:auto;
text-align:center;
}
button,input{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
}
.step{
background:#334155;
padding:10px;
margin-top:10px;
border-radius:10px;
}
video{
width:100%;
margin-top:15px;
border-radius:12px;
}
</style>
</head>
<body>

<div class="box">

<h1>🚀 AMKO AI</h1>

<input type="file"
id="videoFile"
accept="video/*">

<div id="status">
Video မရွေးရသေးပါ
</div>

<button onclick="start()">
🎬 Translate
</button>

<div id="result"></div>

</div>

<script>

let currentFile;

document
.getElementById(
"videoFile"
)
.addEventListener(
"change",
function(){

currentFile=
this.files[0];

if(currentFile){

document
.getElementById(
"status"
)
.innerHTML=
"📁 "+currentFile.name;

}

}
);

async function start(){

if(!currentFile){

alert(
"Video ရွေးပါ"
);

return;

}

document
.getElementById(
"result"
)
.innerHTML=`

<div class='step'>
🤖 AI Processing...
</div>

`;

setTimeout(()=>{

let url=
URL.createObjectURL(
currentFile
);

document
.getElementById(
"result"
)
.innerHTML=`

<h2>
✅ Translation Complete
</h2>

<video
controls
src="${url}">
</video>

<div class='step'>

📝 Myanmar Subtitle:

<br><br>

[00:01]
မင်္ဂလာပါ

<br>

[00:03]
AMKO AI
ဘာသာပြန်ပြီးပါပြီ

</div>

<a
href="${url}"
download="amko_video.mp4">

<button>

⬇️ Download

</button>

</a>

`;

},3000)

}

</script>

</body>
</html>
