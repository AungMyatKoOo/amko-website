<!DOCTYPE html>
<html>
<head>
<title>AMKO AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}
.box{
background:#1e293b;
padding:25px;
border-radius:20px;
max-width:450px;
margin:20px auto;
text-align:center;
}
input,select,button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
font-size:16px;
}
.step{
background:#334155;
padding:12px;
margin-top:10px;
border-radius:10px;
text-align:left;
}
.small{
font-size:13px;
opacity:.8;
}
video{
width:100%;
border-radius:12px;
margin-top:12px;
}
.barbg{
background:#334155;
height:20px;
border-radius:20px;
overflow:hidden;
margin-top:15px;
}
#bar{
height:20px;
width:0%;
}
</style>
</head>
<body>

<div class="box" id="login">

<h1>🚀 AMKO AI</h1>
<p>Login First</p>

<input id="gmail"
placeholder="Enter Gmail">

<button onclick="login()">
🔐 Continue
</button>

</div>

<div class="box"
id="home"
style="display:none">

<h2>👑 Owner Mode Active</h2>

<div class="step">
Profile: owner@gmail.com
<br><br>
Unlimited Access
</div>

<input id="ytlink"
placeholder="Paste YouTube link">

<input type="file"
id="videoFile"
accept="video/*">

<div class="small"
id="fileStatus">
Video မရွေးရသေးပါ
</div>

<select>
<option>Auto → Myanmar</option>
<option>English → Myanmar</option>
<option>Chinese → Myanmar</option>
</select>

<select id="voice">
<option>Myanmar Male Voice</option>
<option>Myanmar Female Voice</option>
</select>

<button onclick="start()">
🎬 Translate
</button>

<div id="process"></div>

<h3>📜 History</h3>

<div class="step">
🎬 English → Myanmar ✓
</div>

<div class="step">
🎬 Chinese → Myanmar ✓
</div>

<h3>⚙️ Settings</h3>

<select>
<option>Subtitle: Default</option>
<option>Large</option>
<option>Minimal</option>
</select>

<button>
💾 Save Settings
</button>

</div>

<script>

let currentFile;

function login(){

let g=
document.getElementById(
"gmail"
).value;

if(g==""){
alert("Gmail ထည့်ပါ");
return;
}

document.getElementById(
"login"
).style.display=
"none";

document.getElementById(
"home"
).style.display=
"block";

}

document
.getElementById(
"videoFile"
)
.addEventListener(
"change",
function(){

currentFile=
this.files[0];

if(currentFile){

document
.getElementById(
"fileStatus"
)
.innerText=
"📁 "+currentFile.name;

}

});

function start(){

let link=
document.getElementById(
"ytlink"
).value;

if(
!currentFile &&
link==""
){
alert(
"YouTube link သို့ Video ထည့်ပါ"
);
return;
}

document
.getElementById(
"process"
)
.innerHTML=`

<h2>🤖 AI Processing...</h2>

<div class="barbg">
<div id="bar"></div>
</div>

<p id="percent">
0%
</p>

<div class='step'
id='status'>
⏳ Starting...
</div>

`;

let p=0;

let timer=
setInterval(()=>{

p+=10;

document
.getElementById(
"bar"
)
.style.width=
p+"%";

document
.getElementById(
"percent"
)
.innerText=
p+"%";

if(p==20){
status.innerText=
"✅ Video analyzed";
}

if(p==40){
status.innerText=
"🌐 Translating...";
}

if(p==60){
status.innerText=
"🗣️ Myanmar voice...";
}

if(p==80){
status.innerText=
"📝 Subtitle...";
}

if(p>=100){

clearInterval(
timer
);

let video="";

if(currentFile){

let url=
URL.createObjectURL(
currentFile
);

video=`

<video
controls
src="${url}">
</video>

<a href="${url}"
download="amko.mp4">

<button>
⬇️ Download Video
</button>

</a>

`;

}else{

video=`

<div class='step'>
📺 YouTube:
<br><br>
${link}
</div>

`;

}

document
.getElementById(
"process"
)
.innerHTML=`

<h2>
✅ Translation Complete
</h2>

${video}

<div class='step'>

📝 Subtitle

<br><br>

[00:01]
မင်္ဂလာပါ

<br>

[00:04]
AMKO AI
ဘာသာပြန်ပြီးပါပြီ

</div>

<div class='step'>
🗣️ Myanmar Voice Added
</div>

`;

}

},500)

}

</script>

</body>
</html>
