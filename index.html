<!DOCTYPE html>
<html>
<head>
<title>Amko</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
padding:20px;
margin:0;
}
.box{
background:#1e293b;
padding:25px;
border-radius:20px;
max-width:420px;
margin:40px auto;
text-align:center;
}
input,select,button{
width:100%;
padding:14px;
margin-top:12px;
border-radius:12px;
border:none;
font-size:16px;
}
button{
cursor:pointer;
}
.small{
font-size:14px;
opacity:.8;
margin-top:10px;
}
</style>
</head>

<body>

<div class="box">
<h1>🚀 AMKO</h1>
<p>One-Click Burmese AI Video Translator</p>

<input type="text" placeholder="Paste YouTube link...">

<select>
<option>Auto Detect → Myanmar</option>
<option>Chinese → Myanmar</option>
<option>English → Myanmar</option>
<option>Any Language → Myanmar</option>
</select>

<select>
<option>Narrator Voice</option>
<option>Male Voice</option>
<option>Female Voice</option>
</select>

<button>🎬 Translate Now</button>

<div class="small">
AI Voice • Subtitle • Burmese Translation
</div>

</div>

</body>
</html>
