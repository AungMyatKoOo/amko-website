<!DOCTYPE html>
<html>
<head>
<title>AMKO AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}
.box{
background:#1e293b;
padding:20px;
border-radius:20px;
max-width:450px;
margin:auto;
text-align:center;
}
input,select,button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
font-size:16px;
}
.step{
background:#334155;
padding:12px;
margin-top:10px;
border-radius:10px;
text-align:left;
}
.small{
font-size:13px;
opacity:.8;
}
.bar{
background:#334155;
height:20px;
border-radius:20px;
overflow:hidden;
margin-top:15px;
}
#fill{
height:20px;
width:0%;
background:#22c55e;
}
video,iframe{
width:100%;
border-radius:12px;
margin-top:12px;
border:none;
}
</style>
</head>
<body>

<div class="box" id="login">
<h1>🚀 AMKO AI</h1>
<input id="gmail" placeholder="Enter Gmail">
<button onclick="login()">🔐 Continue</button>
</div>

<div class="box" id="home" style="display:none">

<h2>👑 Owner Mode Active</h2>

<div class="step">
Profile: owner@gmail.com
</div>

<input id="ytlink"
placeholder="Paste YouTube Link">

<input type="file"
id="videoFile"
accept="video/*">

<div class="small"
id="fileStatus">
Video မရွေးရသေးပါ
</div>

<select>
<option>Auto → Myanmar</option>
<option>English → Myanmar</option>
<option>Chinese → Myanmar</option>
</select>

<select>
<option>Myanmar Male Voice</option>
<option>Myanmar Female Voice</option>
</select>

<button onclick="start()">
🎬 Translate
</button>

<div id="process"></div>

<h3>📜 History</h3>

<div class="step">
🎬 English → Myanmar ✓
</div>

<h3>⚙️ Settings</h3>

<select>
<option>Subtitle Default</option>
<option>Large</option>
</select>

</div>

<script>

let currentFile;

function login(){

let g=
document.getElementById(
"gmail"
).value;

if(g==""){
alert("Gmail ထည့်ပါ");
return;
}

login.style.display="none";
home.style.display="block";

}

videoFile.addEventListener(
"change",
function(){

currentFile=
this.files[0];

if(currentFile){

fileStatus.innerText=
"📁 "+currentFile.name;

}

});

function start(){

let link=
ytlink.value;

if(
!currentFile &&
link==""
){

alert(
"YouTube link သို့ Video ထည့်ပါ"
);

return;

}

process.innerHTML=`

<h2>
🤖 AI Processing...
</h2>

<div class='bar'>
<div id='fill'></div>
</div>

<p id='percent'>
0%
</p>

<div class='step'
id='status'>
⏳ Starting...
</div>

`;

let p=0;

let t=
setInterval(()=>{

p+=10;

fill.style.width=
p+"%";

percent.innerText=
p+"%";

if(p==20)
status.innerText=
"✅ Video analyzed";

if(p==40)
status.innerText=
"🌐 Translating";

if(p==60)
status.innerText=
"🗣️ Voice creating";

if(p==80)
status.innerText=
"📝 Subtitle";

if(p>=100){

clearInterval(t);

let media="";

if(currentFile){

let url=
URL.createObjectURL(
currentFile
);

media=`

<video
controls
src="${url}">
</video>

<a href="${url}"
download>

<button>
⬇️ Download
</button>

</a>

`;

}else{

let id="";

if(
link.includes("v=")
){

id=
link
.split("v=")[1]
.split("&")[0];

}

media=`

<iframe
height="220"
src="
https://www.youtube.com/embed/${id}">
</iframe>

`;

}

process.innerHTML=`

<h2>
✅ Translation Complete
</h2>

${media}

<div class='step'>

📝 Subtitle:

<br><br>

[00:01]
မင်္ဂလာပါ

<br>

[00:03]
AMKO AI
ဘာသာပြန်ပြီးပါပြီ

</div>

<div class='step'>
🗣️ Myanmar Voice Added
</div>

`;

}

},500);

}

</script>

</body>
</html>
